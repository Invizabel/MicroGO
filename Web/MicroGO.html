<html>
    <body>
		<form>
			<strong>Board Size</strong>
			<input type="number" id="boardSize" name="boardSize" value="19">
			<br>
			<br>
  			<button type="button" id="resetButton">Change and Reset</button>
		</form>
        <canvas id="canvas" width="1280" height="640" style="border:1px solid #000000;""></canvas>
    </body>
    <script>
		
		var ratio = 10;
		var c1x = 0;
		var c1y = 0;
		
        var canvas = document.getElementById("canvas");
        var context = canvas.getContext("2d");

		var board_size = parseInt(document.getElementById("boardSize").value, 10);
		var board = [];
		var cell_size = Math.round(64 / board_size);
		var cell_center = 128 - cell_size * board_size;
		for (var i = 0; i < board_size; i += 1)
		{
			var temp = [];
			for (var j = 0; j < board_size; j += 1)
			{
				temp.push(0);
			}
			board.push(temp);
		}
		var cell_size = Math.round(64 / board_size);
		var cell_center = 128 - cell_size * board_size;

		function reset()
		{
			context.fillStyle = "orange";
			context.fillRect(0, 0, canvas.width, canvas.height);

			temp_board_size = parseInt(document.getElementById("boardSize").value, 10);
			if (temp_board_size != board_size)
			{
				board_size = temp_board_size;
			}

			board = [];
			cell_size = Math.round(64 / board_size);
			cell_center = 128 - cell_size * board_size;
			for (var i = 0; i < board_size; i += 1)
			{
				temp = [];
				for (var j = 0; j < board_size; j += 1)
				{
					temp.push(0);
				}
				board.push(temp);
			}
			main();
		}

		function black_groupings()
		{
			var groups = [];
					
			for (var i = 0; i < board_size; i += 1)
			{
				for (var j = 0; j < board_size; j += 1)
				{
					
					var temp = []
					if (1 == board[j][i])
					{
						if (i < board_size)
						{
							if (1 == board[j][i+1])
							{
								if (temp.includes([i,j]))
								{
									temp.push([i,j]);
								}
								temp.push([i+1,j]);
							}
						}
						if (j < board_size)
						{
							if (1 == board[j+1][i])
							{
								if (temp.includes([i,j]))
								{
									temp.push([i,j]);
								}
								temp.push([i,j+1]);
							}
						}
						if (i > 0)
						{
							if (1 == board[j][i-1])
							{
								if (temp.includes([i,j]))
								{
									temp.push([i,j]);
								}
								temp.push([i-1,j]);
							}
						}
						if (j > 0)
						{
							if (1 == board[j-1][i])
							{
								if (temp.includes([i,j]))
								{
									temp.push([i,j]);
								}
								temp.push([i,j-1]);
							}
						}
						if (i < board_size && j < board_size)
						{
							if (1 == board[j+1][i+1])
							{
								if (temp.includes([i,j]))
								{
									temp.push([i,j]);
								}
								temp.push([i+1,j+1]);
							}
						}
						if (i > 0 && j > 0)
						{
							if (1 == board[j-1][i-1])
							{
								if (temp.includes([i,j]))
								{
									temp.push([i,j]);
								}
								temp.push([i-1,j-1]);
							}
						}
					}
					
					if (temp.length > 0)
					{
						is_skip = false;
						for (var k = 0; k < groups.length; k += 1)
						{
							for (var kk = 0; kk < k.length; kk += 1)
							{
								for (var l = 0; l < temp.length; l += 1)
								{
									if (groups[k][kk] == temp[l])
									{
										is_skip = true;
									}
								}
							}
						}

						if (is_skip == false)
						{
							groups.push(temp);
						}
					}
				}
			}

			return groups;
		}

		function capture()
		{
			var black_groups = black_groupings();
			console.log(black_groups);
		}

		function main()
		{
			capture();
			
			context.beginPath();
			context.arc(Math.round((c1x + 0.5) * (cell_size*ratio)), Math.round((c1y + 0.5) * (cell_size*ratio)), Math.round(cell_size * ratio / 2), 0, 2 * Math.PI);
			context.stroke();

			for (var i = 0; i < board_size; i += 1)
			{
				for (var j = 0; j < board_size; j += 1)
				{
					context.beginPath();
					context.rect(i*ratio*cell_size, j*ratio*cell_size, ratio*cell_size, ratio*cell_size);
					context.stroke();
				}
			}

			for (var i = 0; i < board_size; i += 1)
			{
				for (var j = 0; j < board_size; j += 1)
				{
					if (board[j][i] == 1)
					{
						context.beginPath();
						context.arc(Math.round((i + 0.5) * (cell_size*ratio)), Math.round((j + 0.5) * (cell_size*ratio)), Math.round(cell_size * ratio / 2 / 2), 0, 2 * Math.PI);
						context.fillStyle = "black";
						context.fill();
						context.stroke();
					}
					if (board[j][i] == 2)
					{
						context.beginPath();
						context.arc(Math.round((i + 0.5) * (cell_size*ratio)), Math.round((j + 0.5) * (cell_size*ratio)), Math.round(cell_size * ratio / 2 / 2), 0, 2 * Math.PI);
						context.fillStyle = "white";
						context.fill();
						context.stroke();
					}
				}
			}
		}

		document.addEventListener("keydown", function (event)
		{
			if (event.code === "ArrowUp" || event.code === "KeyW")
			{
				if (c1y > 0)
				{
					c1y -= 1;
					main();
				}
			}

			if (event.code === "ArrowDown" || event.code === "KeyS")
			{
				if (c1y < board_size - 1)
				{
					c1y += 1;
					main();
				}
			}

			if (event.code === "ArrowLeft" || event.code === "KeyA")
			{
				if (c1x > 0)
				{
					c1x -= 1;
					main();
				}
			}

			if (event.code === "ArrowRight" || event.code === "KeyD")
			{
				if (c1x < board_size - 1)
				{
					c1x += 1;
					main();
				}
			}

			if (event.code === "Space")
			{
				if (board[c1y][c1x] == 0)
				{
					board[c1y][c1x] = 1;
					while (true)
					{
						var x = Math.floor(Math.random() * board_size);
						var y = Math.floor(Math.random() * board_size);
						if (board[y][x] == 0)
						{
							board[y][x] = 2;
							break;
						}
					}
				}
				
				main();
			}
		});
		
		
		document.getElementById("resetButton").addEventListener("click", reset);

		reset();
    </script>
</html>
