<html>
    <body>
        <canvas id="canvas" width="1024" height="512" style="border:1px solid #000000;""></canvas>
    </body>
    <script>
		var ratio = 8;
		
        var canvas = document.getElementById("canvas");
        var context = canvas.getContext("2d");
		
		function board()
		{
			context.fillStyle = "orange";
			context.fillRect(0, 0, canvas.width, canvas.height);
			for (var i = 48; i < 128-48; i += 8)
			{
				for (var j = 16; j < 64-16; j += 8)
				{
					context.beginPath();
					context.rect(i*ratio, j*ratio, 8*ratio, 8*ratio);
					context.stroke();
				}
			}
		}
		
		function choice()
		{
			context.beginPath();
			context.arc(48*ratio+4*ratio,16*ratio+4*ratio,4*ratio, 0, 2 * Math.PI);
			context.stroke();
		}
		
		function player1()
		{
			context.beginPath();
			context.arc(48*ratio+4*ratio,16*ratio+4*ratio,2*ratio, 0, 2 * Math.PI);
			context.fillStyle = "black";
			context.fill();
			context.stroke();
		}
		
		board();
		choice();
		player1();
	
    </script>
</html>
